<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✂️ Nome da Barbearia | Agendamento</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #c5a059;
            --bg: #0a0a0a;
            --card: #141414;
            --input-bg: #1d1d1d;
            --text: #ffffff;
            --text-dim: #999;
            --grad: linear-gradient(135deg, #c5a059 0%, #a68549 100%);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding-bottom: 50px;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            padding: 20px 0;
        }

        .logo-img {
            width: 180px;
            height: auto;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 0.75rem;
            letter-spacing: 1px;
            color: var(--primary);
            text-transform: uppercase;
            margin-top: 5px;
            font-weight: 600;
        }

        .social-header {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
        }

        .social-header a {
            color: var(--text);
            font-size: 1.4rem;
            transition: 0.3s;
            text-decoration: none;
        }

        .social-header .fa-whatsapp {
            color: #25d366;
        }

        .social-header .fa-instagram {
            background: var(--grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card {
            background: var(--card);
            padding: 25px;
            border-radius: 35px;
            border: 1px solid #222;
        }

        label {
            font-size: 0.7rem;
            color: var(--primary);
            font-weight: 800;
            text-transform: uppercase;
            margin: 15px 0 8px 10px;
            display: block;
        }

        input,
        select {
            width: 100%;
            padding: 18px;
            margin-bottom: 20px;
            border-radius: 20px;
            border: 1px solid #282828;
            background: var(--input-bg);
            color: #fff;
            font-size: 1rem;
        }

        /* GRADE DE SERVIÇOS DESIGN ORIGINAL */
        .servicos-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .servico-card {
            background: #1a1a1a;
            border: 1px solid #282828;
            padding: 15px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .servico-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .servico-nome {
            font-size: 0.9rem;
            font-weight: 800;
            color: #fff;
            text-transform: uppercase;
        }

        .servico-detalhes {
            font-size: 0.7rem;
            color: var(--text-dim);
            font-weight: 600;
        }

        .servico-preco {
            font-family: 'Cinzel', serif;
            color: var(--primary);
            font-weight: 900;
            font-size: 1rem;
        }

        .servico-card.selecionado {
            background: rgba(197, 160, 89, 0.1);
            border-color: var(--primary);
            transform: translateX(5px);
        }

        .servico-card.selecionado::before {
            content: '✓';
            position: absolute;
            right: 10px;
            top: 5px;
            font-size: 0.6rem;
            color: var(--primary);
        }

        /* DATAS */
        .datas-wrapper {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 15px 5px;
            margin-bottom: 20px;
            scrollbar-width: none;
            scroll-snap-type: x mandatory;
        }

        .datas-wrapper::-webkit-scrollbar {
            display: none;
        }

        .card-data {
            min-width: 75px;
            background: #1a1a1a;
            padding: 18px 10px;
            border-radius: 22px;
            border: 1px solid #252525;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex-shrink: 0;
            scroll-snap-align: start;
        }

        .card-data span:first-child {
            font-size: 0.65rem;
            text-transform: uppercase;
            color: var(--text-dim);
            font-weight: 800;
        }

        .card-data span:last-child {
            font-size: 1.2rem;
            font-weight: 900;
            color: #fff;
        }

        .card-data.selecionada {
            background: var(--grad);
            border: none;
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(197, 160, 89, 0.2);
        }

        .card-data.selecionada span {
            color: #000 !important; 
        }

        /* HORÁRIOS */
        .horarios-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }

        .hora-btn {
            background: #1a1a1a;
            padding: 15px 5px;
            text-align: center;
            border-radius: 18px;
            border: 1px solid #252525;
            cursor: pointer;
            color: var(--text-dim);
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); /* Transição suave */
            animation: slideUp 0.4s ease forwards;
        }
        .hora-btn:not(.ocupada):hover {
            border-color: var(--primary);
            background: rgba(197, 160, 89, 0.05);
            transform: scale(1.02);
        }

        @keyframes pulseGold {
            0% { box-shadow: 0 0 0 0 rgba(197, 160, 89, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(197, 160, 89, 0); }
            100% { box-shadow: 0 0 0 0 rgba(197, 160, 89, 0); }
        }
        .hora-btn.selecionada {
            background: var(--grad) !important;
            color: #000 !important;
            font-weight: 800;
            border: none;
            transform: scale(1.05);
            animation: pulseGold 1.5s infinite; /* Brilho pulsante */
        }

        .hora-btn.ocupada {
            background: #0a0a0a !important; /* Fundo quase preto para indicar indisponibilidade */
            border: 1px solid #1a1a1a !important; /* Borda sutil para não sumir no fundo */
            color: #333 !important; /* Texto do horário bem escuro */
            cursor: not-allowed;
            opacity: 0.8; /* Mantém a visibilidade mas com aspecto desativado */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            pointer-events: none; /* Garante que não seja clicável */
        }

        /* Rótulo para reforçar que o horário já foi pego */
        .hora-btn.ocupada::after {
            content: "RESERVADO";
            font-size: 0.5rem;
            font-weight: 800;
            color: #442222; /* Um vermelho bem escuro e discreto */
            margin-top: 2px;
        }

        .btn-principal {
            position: relative;
            width: 100%;
            padding: 22px;
            border-radius: 22px;
            background: var(--grad);
            color: #000;
            font-weight: 900;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 1rem;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(197, 160, 89, 0.2);
        }

        .btn-principal::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 20%;
            height: 200%;
            background: rgba(255, 255, 255, 0.4);
            transform: rotate(30deg);
            animation: shimmer 3s infinite;
        }
        
        /* Estilo para a foto do barbeiro */
        .barbeiro-foto {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary);
            margin-bottom: 2px;
        }
        
        /* Ajuste no card para acomodar a foto */
        .barbeiro-card {
            background: var(--input-bg);
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 10px 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            min-height: 90px; /* Aumentado levemente para caber a foto */
            justify-content: center;
        }

        @keyframes shimmer {
            0% {
                left: -60%;
            }

            30% {
                left: 140%;
            }

            100% {
                left: 140%;
            }
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-cancelar-link {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            text-decoration: underline;
        }

        #modal-sucesso,
        #modal-cancelar {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .success-card {
            background: var(--card);
            padding: 40px 30px;
            border-radius: 40px;
            border: 1px solid var(--primary);
            text-align: center;
            max-width: 350px;
            width: 100%;
        }
        
        /* Estilo para o slot principal selecionado (já deve existir no seu código) */
        .hora-btn.selecionada {
            background: var(--grad) !important;
            border-color: var(--primary) !important;
            color: #000 !important;
        }
        
        /* Estilo para a prévia dos blocos seguintes */
        .hora-btn.previa-slot {
    background: rgba(197, 160, 89, 0.15) !important;
    border: 1px dashed var(--primary) !important;
    color: var(--primary) !important;
    animation: blink 1s infinite alternate;
}
@keyframes blink {
    from { opacity: 0.6; }
    to { opacity: 1; }
}
        
        /* Container em grade: agora com minmax de 90px para caber mais itens por linha */
/* Container: Ajustado para dar um pouco mais de espaço lateral para nomes longos */
.barbeiros-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); /* Reduzido de 100px para 90px */
    gap: 8px; /* Reduzido de 10px para 8px */
    margin-top: 15px;
}

/* Card do Barbeiro: Ajustado com min-height para manter o padrão visual */
.barbeiro-card {
    background: var(--input-bg);
    border: 2px solid transparent;
    border-radius: 12px;
    padding: 8px 5px; /* Reduzido o preenchimento interno */
    text-align: center;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px; /* Menor espaço entre ícone e texto */
    min-height: 65px; /* Redução significativa na altura */
    justify-content: center;
}

.barbeiro-card.selected {
    border-color: var(--primary);
    background: rgba(197, 160, 89, 0.15);
    transform: translateY(-2px);
}

.barbeiro-card i {
    font-size: 1rem; 
    color: var(--primary);
    display: block;
}

/* Texto do Nome: Agora permite quebra de linha para mostrar o nome todo */
.barbeiro-card span {
    font-size: 0.75rem; 
    font-weight: 600;
    color: var(--text);
    display: block;
    line-height: 1.1;
    word-wrap: break-word;
    text-align: center;
    width: 100%;
}
    </style>
</head>

<body>

    <div id="modal-sucesso">
    <div class="success-card">
        <div style="font-size: 3rem; margin-bottom: 10px;">✂️</div>
        <h2 style="color:var(--primary); font-family:'Cinzel', serif; font-size: 1.8rem; margin-bottom: 5px;">RESERVA FEITA!</h2>
        <p style="color:var(--text-dim); margin-bottom: 20px;">Seu estilo está garantido.</p>
        
        <div style="background: rgba(255, 68, 68, 0.1); border: 1px dashed #ff4444; padding: 15px; border-radius: 20px; margin-bottom: 25px;">
            <p style="color: #ff4444; font-size: 0.75rem; font-weight: 800; margin: 0; text-transform: uppercase; letter-spacing: 0.5px;">
                ⚠️ Política de Cancelamento
            </p>
            <p style="color: var(--text); font-size: 0.7rem; margin-top: 5px; line-height: 1.4;">
                Para cancelar, é necessário realizar o procedimento com pelo menos <b>1 hora de antecedência</b> do horário marcado.
            </p>

        <button class="btn-principal" onclick="location.reload()">Entendido</button>

</div>

            <div id="lista-cancelamento" style="margin-bottom: 15px; display: flex; flex-direction: column; gap: 8px;"></div>

            <button class="btn-principal" id="btn-buscar-cancel" onclick="buscarAgendamentosParaCancelar()">Buscar Agendamentos</button>
            <button class="btn-cancelar-link" onclick="location.reload()">Voltar</button>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <img src="logo_insta.png" alt="Logo" class="logo-img">
            <p>Rua Ramira Cabral, 73 - CENTRO JACAREÍ - SP</p>
            <div class="social-header">
                <a href="https://www.instagram.com/el_negrones" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="https://wa.me/5512996025236" target="_blank"><i class="fab fa-whatsapp"></i></a>
            </div>
        </div>

        <div class="card">
    <label>Quem vai cuidar do seu estilo?</label>
    <select id="select-barbeiro" onchange="atualizarServicos()" style="display:none;">
        <option value="">Selecione...</option>
    </select>
    
    <div id="barbeiros-container" class="barbeiros-grid"></div>
</div>

            <label>O que vamos fazer hoje?</label>
            <div id="grid-servicos" class="servicos-grid"></div>
            <input type="hidden" id="select-servico">

            <label>Escolha o dia (Arraste 👉)</label>
            <div class="datas-wrapper" id="render-datas"></div>
            <input type="hidden" id="data-agenda">

            <label>Horários Disponíveis</label>
            <div class="horarios-grid" id="grid-horarios"></div>

            <label>Seu Nome</label>
            <input type="text" id="nome-cliente" placeholder="Como podemos te chamar?">

            <label>WhatsApp</label>
            <input type="tel" id="whatsapp-cliente" placeholder="(00) 00000-0000" maxlength="15">
            
            <div id="resumo-carrinho" style="display:none; background: #1a1a1a; padding: 20px; border-radius: 25px; border: 1px dashed var(--primary); margin-bottom: 20px;">
                <label style="margin:0 0 10px 0;">Itens selecionados:</label>
                <div id="lista-carrinho" style="display: flex; flex-direction: column; gap: 10px;"></div>
            </div>
            
            <button class="btn-principal" id="btn-adicionar" onclick="adicionarAoCarrinho()" style="margin-bottom: 10px; background: none; border: 2px solid var(--primary); color: var(--primary);">
                + Adicionar outro serviço/horário
            </button>

            <button class="btn-principal" id="btn-confirmar" onclick="confirmarAgendamento()">Finalizar Agendamento</button>
            <button class="btn-cancelar-link" onclick="document.getElementById('modal-cancelar').style.display='flex'">Cancelar meu agendamento</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyBmed7tZQSDyvgicwUs9fxiXNXJAl-9XZY",
          authDomain: "barbeariatestes.firebaseapp.com",
          projectId: "barbeariatestes",
          storageBucket: "barbeariatestes.firebasestorage.app",
          messagingSenderId: "954663067578",
          appId: "1:954663067578:web:f5ae7c403a96b8d375c783"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let barbeirosData = [];
        let horarioSelecionado = null;

        window.onload = () => {
            carregarBarbeiros();
            mascarar(document.getElementById('whatsapp-cliente'));
            mascarar(document.getElementById('cancel-zap'));
        };

        function mascarar(el) {
            el.addEventListener('input', (e) => {
                let v = e.target.value.replace(/\D/g, '');
                if (v.length > 11) v = v.slice(0, 11);
                
                if (v.length > 10) {
                    v = v.replace(/^(\d{2})(\d{5})(\d{4}).*/, '($1) $2-$3');
                } else if (v.length > 6) {
                    v = v.replace(/^(\d{2})(\d{4})(\d{0,4}).*/, '($1) $2-$3');
                } else if (v.length > 2) {
                    v = v.replace(/^(\d{2})(\d{0,5})/, '($1) $2');
                } else if (v.length > 0) {
                    v = v.replace(/^(\d*)/, '($1');
                }
                e.target.value = v;
            });
        }
        
        let carrinho = []; //

        function atualizarInterfaceCarrinho() {
            const resumo = document.getElementById("resumo-carrinho");
            const lista = document.getElementById("lista-carrinho");
            
            if (carrinho.length > 0) {
                resumo.style.display = "block";
                lista.innerHTML = "";
                
                carrinho.forEach((item, index) => {
                    const div = document.createElement("div");
                    div.style = "font-size: 0.8rem; background: #222; padding: 12px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333;";
                    div.innerHTML = `
                        <span><b>${item.hora}</b> - ${item.servico} <br><small style="color:var(--primary)">${item.barbeiroNome}</small></span>
                        <i class="fas fa-trash" onclick="removerDoCarrinho(${index})" style="color: #ff4444; cursor: pointer; padding: 10px;"></i>
                    `;
                    lista.appendChild(div);
                });
            } else {
                resumo.style.display = "none";
            }
        }
        
        function removerDoCarrinho(index) {
            carrinho.splice(index, 1);
            atualizarInterfaceCarrinho();
            const dataAtual = document.getElementById('data-agenda').value;
            if (dataAtual) carregarHorarios(dataAtual); // Libera o horário visualmente
        }
        
        function adicionarAoCarrinho() {
            const nome = document.getElementById("nome-cliente").value;
            const zap = document.getElementById("whatsapp-cliente").value;
            const bId = document.getElementById("select-barbeiro").value;
            const data = document.getElementById("data-agenda").value;
            const servTexto = document.getElementById("select-servico").value;
        
            if (!nome || !horarioSelecionado || !data || !servTexto) {
                return alert("Selecione o serviço e o horário antes de adicionar!");
            }
        
            const bNome = barbeirosData.find(b => b.id === bId).nome;
            const partes = servTexto.split(' - ');
            const duracaoAtual = parseInt(partes[2]) || 30;
        
            // Criar objeto do agendamento
            const novoAgendamento = {
                cliente: nome.toUpperCase(),
                whatsapp: zap,
                barbeiroId: bId,
                barbeiroNome: bNome,
                data: data,
                hora: horarioSelecionado,
                servico: partes[0].toUpperCase(),
                duracao: duracaoAtual
            };
        
            carrinho.push(novoAgendamento);
            atualizarInterfaceCarrinho();
            
            // Reseta seleções para o próximo item
            horarioSelecionado = null;
            document.querySelectorAll(".hora-btn").forEach(e => e.classList.remove("selecionada", "previa-slot"));
            
            // Atualiza a grade para bloquear os slots recém-ocupados
            carregarHorarios(data);
            alert("Adicionado ao carrinho!");
        }

        async function confirmarAgendamento() {
    // --- NOVA VALIDAÇÃO DE CAMPOS ---
    const nomeInput = document.getElementById("nome-cliente").value.trim();
    const zapInput = document.getElementById("whatsapp-cliente").value.trim();

    if (nomeInput.length < 3) {
        return alert("Por favor, insira seu nome completo antes de finalizar.");
    }

    // Verifica se o WhatsApp está preenchido corretamente (mínimo de 14 caracteres com a máscara)
    if (zapInput.length < 14) {
        return alert("Por favor, insira um número de WhatsApp válido com DDD.");
    }
    // -------------------------------

    // 1. Se o usuário escolheu um horário na tela mas esqueceu de clicar em "Adicionar",
    // nós tentamos adicionar para ele automaticamente.
    if (horarioSelecionado && document.getElementById("select-servico").value) {
        const bId = document.getElementById("select-barbeiro").value;
        const data = document.getElementById("data-agenda").value;
        const jaEstaNoCarrinho = carrinho.some(item => item.data === data && item.hora === horarioSelecionado && item.barbeiroId === bId);
        
        if (!jaEstaNoCarrinho) {
            adicionarAoCarrinho();
        }
    }

    // 2. Verifica se o carrinho tem itens (agora com garantia de que os dados acima existem)
    if (carrinho.length === 0) {
        return alert("Selecione um serviço e horário e clique em 'Adicionar' antes de finalizar!");
    }

    const btn = document.getElementById("btn-confirmar");
    if(btn) {
        btn.disabled = true;
        btn.textContent = "PROCESSANDO...";
    }

    try {
        const batch = db.batch();
        
        carrinho.forEach(ag => {
            const ref = db.collection("agenda").doc();
            batch.set(ref, {
                cliente: ag.cliente,
                whatsapp: ag.whatsapp, // O valor do zap capturado no adicionarAoCarrinho
                barbeiroId: ag.barbeiroId,
                data: ag.data,
                hora: ag.hora,
                servico: ag.servico,
                duracao: ag.duracao,
                criadoEm: new Date()
            });
        });

        await batch.commit();

        for (const ag of carrinho) {
            enviarNotificacaoTelegram(ag.cliente, ag.data, ag.hora, ag.servico, ag.barbeiroNome);
        }

        carrinho = [];
        atualizarInterfaceCarrinho();
        document.getElementById('modal-sucesso').style.display = 'flex';
        
    } catch (e) {
        console.error("Erro ao finalizar batch:", e);
        alert("Erro ao finalizar agendamentos. Tente novamente.");
    } finally {
        if(btn) {
            btn.disabled = false;
            btn.textContent = "Finalizar Agendamento";
        }
    }
}

        async function renderizarDatasPremium() {
    const render = document.getElementById('render-datas');
    const bId = document.getElementById("select-barbeiro").value;
    if (!bId) return;
    render.innerHTML = "Carregando...";
    try {
        const configDoc = await db.collection("config_datas").doc(bId).get();
        if (!configDoc.exists) {
            render.innerHTML = "Indisponível.";
            return;
        }
        const { dias: diasPermitidos, horizonte = 7 } = configDoc.data();
        render.innerHTML = "";
        const nomes = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];

        // CORREÇÃO AQUI: Pegamos a data atual de SP como uma string "AAAA-MM-DD"
        const hojeBrString = new Date().toLocaleDateString('sv-SE', { timeZone: 'America/Sao_Paulo' });
        
        for (let i = 0; i < horizonte; i++) {
            // Criamos a data baseada na string local para não ter erro de fuso
            let d = new Date(hojeBrString + "T00:00:00"); 
            d.setDate(d.getDate() + i);

            if (diasPermitidos.includes(d.getDay())) {
                // CORREÇÃO AQUI: Gerar o ISO manualmente ou usar a data local
                const ano = d.getFullYear();
                const mes = String(d.getMonth() + 1).padStart(2, '0');
                const dia = String(d.getDate()).padStart(2, '0');
                const iso = `${ano}-${mes}-${dia}`;

                const card = document.createElement('div');
                card.className = 'card-data';
                card.innerHTML = `<span>${nomes[d.getDay()]}</span><span>${d.getDate()}</span>`;
                card.onclick = () => {
                    document.querySelectorAll('.card-data').forEach(c => c.classList.remove('selecionada'));
                    card.classList.add('selecionada');
                    document.getElementById('data-agenda').value = iso;
                    carregarHorarios(iso);
                };
                render.appendChild(card);
            }
        }
    } catch (e) {
        console.error(e);
        render.innerHTML = "Erro.";
    }
}
        function getDiaNome(data) {
            const dias = ["domingo", "segunda", "terca", "quarta", "quinta", "sexta", "sabado"];
            // O split garante que a data não mude por causa do fuso horário do telemóvel
            const [ano, mes, dia] = data.split('-').map(Number);
            const dataLocal = new Date(ano, mes - 1, dia); 
            return dias[dataLocal.getDay()];
        }

        async function carregarHorarios(data) {
    const grid = document.getElementById("grid-horarios");
    const bId = document.getElementById("select-barbeiro").value;
    const servTexto = document.getElementById("select-servico").value;
    
    if (!bId || !servTexto) return;
    grid.innerHTML = "Buscando...";

    const partesServico = servTexto.split(' - ');
    const duracaoServico = parseInt(partesServico[2]) || 30; 
    const slotsNecessarios = Math.ceil(duracaoServico / 10);
 
    const agora = new Date();
    const hojeISO = agora.getFullYear() + '-' + String(agora.getMonth() + 1).padStart(2, '0') + '-' + String(agora.getDate()).padStart(2, '0');
    const horaAtualTotal = agora.getHours() * 100 + agora.getMinutes();

    // --- LÓGICA DE TRADUÇÃO PARA NOMES ---
    const diasNomes = ["domingo", "segunda", "terca", "quarta", "quinta", "sexta", "sabado"];
    const partes = data.split('-').map(Number); 
    const dataObjeto = new Date(Date.UTC(partes[0], partes[1] - 1, partes[2], 12, 0, 0)); 
    const diaNomeCurto = diasNomes[dataObjeto.getUTCDay()]; 
    
    const mapeamentoCompleto = {
        "domingo": "Domingo",
        "segunda": "Segunda-feira",
        "terca": "Terça-feira",
        "quarta": "Quarta-feira",
        "quinta": "Quinta-feira",
        "sexta": "Sexta-feira",
        "sabado": "Sábado"
    };
    const diaSemanaAdmin = mapeamentoCompleto[diaNomeCurto];

    try {
        const [agSnap, blSnapData, blSnapSemana, gradeDoc] = await Promise.all([
            db.collection("agenda").where("data", "==", data).where("barbeiroId", "==", bId).get(),
            db.collection("bloqueios").where("data", "==", data).where("barbeiroId", "==", bId).get(),
            db.collection("bloqueios").where("diaSemana", "==", diaSemanaAdmin).where("barbeiroId", "==", bId).get(),
            db.collection("grades").doc(bId).get()
        ]);

        let horariosGrade = [];
        if (gradeDoc.exists && gradeDoc.data().dias) {
            horariosGrade = gradeDoc.data().dias[diaNomeCurto] || [];
        }
        horariosGrade.sort();

        // 1. Mapeia ocupados do BANCO DE DADOS (Agenda e Bloqueios)
        let ocupadosNoBanco = [
            ...blSnapData.docs.map(d => d.data().hora),
            ...blSnapSemana.docs.map(d => d.data().hora)
        ];

        agSnap.docs.forEach(doc => {
            const ag = doc.data();
            let tempH = ag.hora;
            for (let i = 0; i < Math.ceil(ag.duracao / 10); i++) {
                ocupadosNoBanco.push(tempH);
                tempH = somar10(tempH);
            }
        });

        // 2. Mapeia ocupados do CARRINHO LOCAL (Para evitar sobreposição)
        let ocupadosNoCarrinho = [];
        carrinho.forEach(item => {
            if (item.data === data && item.barbeiroId === bId) {
                let tempH = item.hora;
                for (let i = 0; i < Math.ceil(item.duracao / 10); i++) {
                    ocupadosNoCarrinho.push(tempH);
                    tempH = somar10(tempH);
                }
            }
        });

        grid.innerHTML = "";

        if (horariosGrade.length === 0) {
            grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 20px; color: var(--text-dim);">
                                <i class="fas fa-calendar-times" style="display:block; font-size:2rem; margin-bottom:10px; color:var(--primary);"></i>
                                Nenhum horário disponível para ${diaNomeCurto}.
                              </div>`;
            return;
        }

        horariosGrade.forEach(h => {
            const [hHora, hMin] = h.split(':').map(Number);
            const hValor = hHora * 100 + hMin;
            const jaPassou = (data === hojeISO && hValor <= horaAtualTotal);

            // Verifica se o serviço atual cabe a partir deste horário sem bater no banco ou no carrinho
            let conflito = false;
            let checarHora = h;
            for (let i = 0; i < slotsNecessarios; i++) {
                if (ocupadosNoBanco.includes(checarHora) || 
                    ocupadosNoCarrinho.includes(checarHora) || 
                    !horariosGrade.includes(checarHora)) {
                    conflito = true;
                    break;
                }
                checarHora = somar10(checarHora);
            }

            const isIndisponivel = conflito || jaPassou;
            const btn = document.createElement("div");
            
            btn.className = "hora-btn " + (isIndisponivel ? "ocupada" : "");
            
            // Se o horário está indisponível por causa do carrinho, você pode dar um feedback visual diferente
            if (conflito && ocupadosNoCarrinho.includes(h)) {
                btn.style.opacity = "0.5";
                btn.innerHTML = `${h}<br><span style="font-size:0.5rem;">NO CARRINHO</span>`;
            } else {
                btn.textContent = h;
            }

            if (!isIndisponivel) {
                btn.onclick = () => {
                    document.querySelectorAll(".hora-btn").forEach(e => {
                        e.classList.remove("selecionada", "previa-slot");
                    });

                    btn.classList.add("selecionada");
                    horarioSelecionado = h;

                    let proximoPreview = h;
                    for (let i = 1; i < slotsNecessarios; i++) {
                        proximoPreview = somar10(proximoPreview);
                        const botoes = Array.from(document.querySelectorAll(".hora-btn"));
                        const btnSlot = botoes.find(b => b.textContent === proximoPreview);
                        if (btnSlot) btnSlot.classList.add("previa-slot");
                    }
                };
            }
            
            grid.appendChild(btn);
        });
    } catch (error) {
        console.error("Erro:", error);
        grid.innerHTML = "Erro ao carregar horários.";
    }
}

        function somar10(h) {
            let [hh, mm] = h.split(':').map(Number);
            mm += 10;
            if (mm >= 60) {
                hh++;
                mm = 0;
            }
            return `${String(hh).padStart(2, '0')}:${String(mm).padStart(2, '0')}`;
        }


        async function enviarNotificacaoTelegram(n, d, h, s, b) {
            try {
                const doc = await db.collection("configuracao").doc("bot").get();
                if (!doc.exists) {
                    console.error("Configuração do bot não encontrada no Firebase!");
                    return;
                }
                const { token, chatid } = doc.data(); // Verifique se no Firebase é 'chatid' ou 'chatId'
                
                const msg = `<b>✂️ NOVO AGENDAMENTO</b>\n\n<b>👤 Cliente:</b> ${n.toUpperCase()}\n<b>📅 Data:</b> ${d.split('-').reverse().join('/')}\n<b>⏰ Hora:</b> ${h}\n<b>🧔 Barbeiro:</b> ${b.toUpperCase()}\n<b>⚡ Serviço:</b> ${s.toUpperCase()}`;
                
                await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: chatid,
                        text: msg,
                        parse_mode: 'HTML'
                    })
                });
            } catch (error) {
                console.error("Erro ao enviar para o Telegram:", error);
            }
        }

        function resetarHorarios() {
            horarioSelecionado = null;
            document.getElementById("grid-horarios").innerHTML = "";
        }

        async function buscarAgendamentosParaCancelar() {
            const zap = document.getElementById("cancel-zap").value;
            const data = document.getElementById("cancel-data").value;
            const listaContainer = document.getElementById("lista-cancelamento");
            const btnBusca = document.getElementById("btn-buscar-cancel");

            if (!zap || !data) return alert("Informe o WhatsApp e a Data.");

            const snap = await db.collection("agenda").where("whatsapp", "==", zap).where("data", "==", data).get();

            if (snap.empty) {
                alert("Nenhum agendamento encontrado para estes dados.");
                return;
            }

            // Limpa o container e esconde o botão de busca
            listaContainer.innerHTML = '<p style="font-size:0.6rem; color:var(--primary); font-weight:bold; margin-bottom:10px;">CLIQUE NO HORÁRIO PARA CANCELAR:</p>';
            btnBusca.style.display = 'none';

            snap.forEach(doc => {
                const ag = doc.data();
                const btn = document.createElement("button");
                // Estilo do botão de cada horário
                btn.style = "background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 12px; border-radius: 15px; font-size: 0.75rem; cursor: pointer; text-align: left; width: 100%;";
                btn.innerHTML = `<b>⏰ ${ag.hora}</b> - ${ag.cliente}<br><small style="color:var(--text-dim)">${ag.servico}</small>`;
                
                btn.onclick = () => efetuarCancelamentoIndividual(doc.id, ag.data, ag.hora);
                listaContainer.appendChild(btn);
            });
        }

        async function efetuarCancelamentoIndividual(id, dataAg, horaAg) { 
            const agora = new Date();
            const [h, m] = horaAg.split(':');
            const dataHoraAg = new Date(dataAg + 'T' + h + ':' + m + ':00');
            
            const diffMs = dataHoraAg - agora;
            const diffHoras = diffMs / (1000 * 60 * 60);

            if (diffHoras < 1) {
                alert("❌ Não é possível cancelar. O prazo de 1 hora de antecedência expirou.");
                return;
            }

            if (confirm(`Deseja cancelar o horário das ${horaAg}?`)) {
                try {
                    // Busca os dados antes de deletar para enviar na notificação
                    const docRef = db.collection("agenda").doc(id);
                    const docSnap = await docRef.get();
                    const dadosAg = docSnap.data();

                    await docRef.delete();
                    
                    // Envia a notificação de cancelamento para o Telegram
                    const bNome = barbeirosData.find(b => b.id === dadosAg.barbeiroId)?.nome || "Não identificado";
                    await enviarNotificacaoCancelamentoTelegram(dadosAg.cliente, dadosAg.data, dadosAg.hora, dadosAg.servico, bNome);

                    alert("Agendamento cancelado com sucesso!");
                    location.reload();
                } catch (e) {
                    console.error(e);
                    alert("Erro ao cancelar. Tente novamente.");
                }
            }
        }
        
        async function cancelarAgendamentoConfirmado(id) {
            try {
                const docRef = db.collection("agenda").doc(id);
                const snap = await docRef.get();
                
                if (snap.exists) {
                    const dados = snap.data();
                    
                    // 1. Deleta do banco
                    await docRef.delete();
                    
                    // 2. Busca o nome do barbeiro para a mensagem
                    const bNome = barbeirosData.find(b => b.id === dados.barbeiroId)?.nome || "Barbeiro";
                    
                    // 3. ENVIA A NOTIFICAÇÃO (Aqui é onde o bot trabalha)
                    await enviarNotificacaoCancelamentoTelegram(
                        dados.cliente, 
                        dados.data, 
                        dados.hora, 
                        dados.servico, 
                        bNome
                    );
        
                    alert("Cancelado com sucesso!");
                    location.reload();
                }
            } catch (e) {
                console.error("Erro no cancelamento:", e);
                alert("Erro ao cancelar.");
            }
        }

                    `<b>🧔 Barbeiro:</b> ${b.toUpperCase()}\n` +

            headers: { 'Content-Type': 'application/json' },

                text: msg,

            })

        if (!response.ok) {

            console.error("Erro na API do Telegram:", errorData);
        }
